<style>
:root { --bg:#f6f7fb; --card:#ffffff; --ink:#162033; --muted:#607086; --accent:#155eef; --line:#d9e1ee; --warn:#9a5b00; --warnbg:#fff6dd; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","Hiragino Sans",Meiryo,sans-serif; background:var(--bg); color:var(--ink); line-height:1.35; }
header { padding:12px 12px 10px; background:linear-gradient(180deg,#fff,#f8faff); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:2; }
h1 { margin:0 0 3px; font-size:16px; line-height:1.25; }
.sub { color:var(--muted); font-size:11px; }
.controls { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
button { border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:999px; padding:6px 9px; font-weight:700; font-size:12px; }
button.primary { background:var(--accent); color:white; border-color:var(--accent); }
main { padding:8px 8px 24px; max-width:760px; margin:auto; }
.status { background:#eaf1ff; border:1px solid #c8d8ff; padding:7px 9px; border-radius:10px; margin-bottom:8px; font-size:12px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:12px; margin:6px 0; padding:8px 9px; box-shadow:0 1px 2px rgba(20,30,50,.04); }
.card.next { border-color:#8cacff; box-shadow:0 2px 10px rgba(21,94,239,.12); }
.head { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:5px; }
.times { font-size:18px; font-weight:800; letter-spacing:.1px; white-space:nowrap; }
.badge { background:#eef4ff; color:#164bbd; border-radius:999px; padding:2px 7px; font-size:11px; font-weight:700; white-space:nowrap; }
.legs { display:grid; gap:3px; }
.leg { font-size:13px; padding:3px 0; border-top:1px solid #eef2f8; white-space:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.leg:first-child { border-top:0; }
.leg.limited { margin:2px -4px; padding:5px 7px; border:1px solid #ffd67a; border-radius:9px; background:linear-gradient(90deg,#fff1c7,#fffaf0); box-shadow:inset 3px 0 0 #f2a900; font-size:14px; font-weight:900; }
.leg.limited .train { color:#8a5200; }
.leg.limited .time { font-size:15px; color:#111827; }
.train { font-weight:800; }
.time { font-weight:800; }
.muted { color:var(--muted); }
.warn { background:var(--warnbg); color:var(--warn); border:1px solid #f4dd9a; border-radius:8px; padding:5px 7px; margin-top:6px; font-size:12px; }
.meta { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; color:var(--muted); font-size:11px; }
.meta span { background:#f3f5f9; border-radius:999px; padding:2px 6px; }
.tablewrap { overflow:auto; border:1px solid var(--line); border-radius:12px; background:white; margin-top:8px; }
table { border-collapse:collapse; width:100%; min-width:420px; }
th,td { border-bottom:1px solid var(--line); padding:6px 7px; text-align:left; font-size:12px; white-space:nowrap; }
th { background:#f3f6fb; position:sticky; top:0; }
tr.limited-row td { background:#fff6dd; font-weight:800; }
footer { color:var(--muted); font-size:11px; padding:10px 4px 20px; }
.empty { padding:18px; text-align:center; color:var(--muted); font-size:13px; }
@media (max-width:390px) { .times { font-size:16px; } .leg { font-size:12px; } h1 { font-size:15px; } }
</style>
</head>

function toMin(t) { let [h,m]=t.split(':').map(Number); if(h===0) h=24; return h*60+m; }
function nowMin() { const d=new Date(); let h=d.getHours(), m=d.getMinutes(); if(h===0) h=24; return h*60+m; }
function fmtNow() { const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function routeCard(r, idx, isNext) {
  if(!r.nankaiDep) {
    return `<div class="card"><div class="head"><div class="times">${r.jrDep} 発</div><span class="badge">接続なし</span></div><div class="warn">${r.note}</div></div>`;
  }
  const wait = r.waitLimited ?? (toMin(r.nankaiDep)-toMin(r.jrArr));
  const warn = wait>=35 ? `<div class="warn">新今宮で特急待ち ${wait}分。急ぐだけなら普通/急行利用の方が早い可能性あり。</div>` : '';
  const next = isNext ? '<span class="badge">次</span>' : `<span class="badge">${idx+1}</span>`;
  const city = r.cityArr || '—';
  return `<div class="card ${isNext?'next':''}">
    <div class="head"><div class="times">${r.jrDep} 野田 → ${city} 市役所前</div>${next}</div>
    <div class="legs">
      <div class="leg"><span class="train">${r.jrType}</span>　<span class="time">${r.jrDep}</span> 野田 → <span class="time">${r.jrArr}</span> 新今宮</div>
      <div class="leg limited"><span class="train">★ ${r.limited}</span>　<span class="time">${r.nankaiDep}</span> 新今宮 → <span class="time">${r.nankaiArr}</span> 岸和田</div>
      <div class="leg"><span class="train">南海本線</span>　<span class="time">${r.kishiDep || '—'}</span> 岸和田 → <span class="time">${r.kaizukaArr || '—'}</span> 貝塚</div>
      <div class="leg"><span class="train">水間鉄道</span>　<span class="time">${r.mizumaDep || '—'}</span> 貝塚 → <span class="time">${city}</span> 貝塚市役所前</div>
    </div>
    ${warn}
    <div class="meta"><span>新今宮待ち ${wait}分</span><span>所要 ${r.total || '—'}分</span></div>
  </div>`;
}

function render(mode='future') {
  const app=document.getElementById('app'); const status=document.getElementById('status');
  const n=nowMin();
  status.textContent=`現在時刻 ${fmtNow()} ／ 表示モード: ${mode==='future'?'これから乗れる候補':mode==='all'?'全候補':'新今宮発ラピートβ・サザン時刻表'}`;
  if(mode==='limited') {
    app.innerHTML = `<div class="tablewrap"><table><thead><tr><th>新今宮発</th><th>種別・号数</th><th>岸和田着</th></tr></thead><tbody>${LIMITED.map(x=>`<tr class="limited-row"><td>${x.dep}</td><td>★ ${x.name}</td><td>${x.arr}</td></tr>`).join('')}</tbody></table></div>`;
    return;
  }
  let list = mode==='all' ? ROUTES : ROUTES.filter(r=>toMin(r.jrDep)>=n);
  if(!list.length) { app.innerHTML='<div class="empty">今日これから利用できる候補はありません。全候補表示で時刻表は確認できます。</div>'; return; }
  if(mode==='future') list=list.slice(0,10);
  app.innerHTML = list.map((r,i)=>routeCard(r,i, mode==='future' && i===0)).join('');
}
render('future');
</script>
</body>
</html>
